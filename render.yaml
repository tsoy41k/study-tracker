# Render.com infrastructure-as-code config.
# Render reads this file when you connect the repo and provisions the web service.
#
# NOTE: the free tier does NOT support persistent disks, so the SQLite file
# lives on ephemeral storage. The database is RESET on every redeploy and when
# the instance wakes from sleep. This is fine for a demo. For durable storage,
# upgrade to a paid plan with a disk, or switch to a managed PostgreSQL.

services:
  - type: web
    name: study-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong random value
      - key: PYTHON_VERSION
        value: "3.12.6"
