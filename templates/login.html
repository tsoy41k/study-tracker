{# login.html — sign-in form. Submits {user_id, password} to the /login route. #}
{% extends "base.html" %}
{% block title %}Log in - Study Tracker{% endblock %}
{% block content %}
<section class="auth-card">
  <h1>Log in</h1>
  <p class="muted">Enter your numeric Student ID and password.</p>
  <form method="post" class="form">
    <label>Student ID
      <input type="text" name="user_id" inputmode="numeric" pattern="[0-9]+"
             placeholder="e.g. 220112345" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button class="btn btn-primary" type="submit">Log in</button>
  </form>
  <p class="muted small">No account? <a href="{{ url_for('register') }}">Register here</a>.</p>
</section>
{% endblock %}
